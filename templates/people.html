<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vigilance - People</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">AI VIGILANCE</div>
        <nav>
            <a href="/">Feeds</a>
            <a href="/people" class="active">People</a>
            <a href="/cameras">Cameras</a>
            <a href="/search">Search</a>
            <a href="/recordings_page">Recordings</a>
            <a href="/analytics">Analytics</a>
        </nav>
    </header>
    <main>
        <div class="sidebar" style="width:100%; max-width:600px;">
            <section class="registration">
                <div class="section-title">
                    <h2>Register Person</h2>
                </div>
                <form id="register-form" style="display:flex; flex-direction:column; gap:0.5rem;">
                    <input type="text" name="name" placeholder="Full Name" required>
                    <input type="file" name="file" accept="image/*" style="margin-bottom:1rem;" required>
                    <button type="submit" class="btn-primary"><i class="fa-solid fa-user-plus"></i> Register</button>
                </form>
                <div id="reg-status" style="margin-top: 1rem; color: var(--text-muted); font-size: 0.9rem;"></div>
            </section>
        </div>
        <div class="dashboard">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
                <h2 style="margin:0;">Registered Persons</h2>
            </div>
            <div id="persons-list" class="results-grid">
                <p style="color:var(--text-muted);">Loading registered persons...</p>
            </div>
        </div>
    </main>
    <script src="/static/script.js"></script>
</body>
</html>
