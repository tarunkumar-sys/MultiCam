{% extends base_template %}

{% block content %}
<div class="people-wrapper" style="padding: 32px; display: grid; grid-template-columns: 380px 1fr; gap: 32px; height: 100%; overflow-y: auto;">
    <!-- Registration Section -->
    <div class="reg-section">
        <div class="card" style="padding: 32px; position: sticky; top: 0;">
            <h3 style="font-size: 20px; font-weight: 800; margin-bottom: 8px; color: var(--accent);">Identity Registry</h3>
            <p style="color: var(--text-secondary); font-size: 13px; margin-bottom: 32px;">Register new authorized personnel into the global biometric database.</p>
            
            <form id="register-identity-form">
                <div class="input-group" style="margin-bottom: 24px;">
                    <label>Full Identity Name</label>
                    <input type="text" name="name" placeholder="e.g. John Wick" required class="search-input">
                </div>
                <div class="input-group" style="margin-bottom: 32px;">
                    <label>Reference Biometric Image</label>
                    <div class="file-drop-zone" onclick="document.getElementById('reg-file').click()" style="border: 2px dashed var(--border-color); padding: 32px; border-radius: 12px; text-align: center; cursor: pointer; transition: var(--transition);">
                        <i class="fa-solid fa-cloud-arrow-up" style="font-size: 24px; color: var(--text-secondary); margin-bottom: 12px;"></i>
                        <div style="font-size: 12px; font-weight: 700; color: var(--text-secondary);">DROP IMAGE OR CLICK</div>
                        <input type="file" id="reg-file" name="file" accept="image/*" required style="display: none;" onchange="updateFileLabel(this)">
                        <div id="file-label" style="font-size: 11px; color: var(--accent); margin-top: 8px; display: none;"></div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="identity-reg-btn">
                    <i class="fa-solid fa-user-plus"></i> INITIALIZE PROFILE
                </button>
            </form>
        </div>
    </div>

    <!-- Registry Table Section -->
    <div class="list-section">
        <div class="card" style="overflow: hidden;">
            <div style="padding: 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                <h3 style="font-size: 18px; font-weight: 700;">Global Population</h3>
                <div class="badge" id="registry-count" style="background: var(--bg-secondary); padding: 6px 12px; border-radius: 100px; font-size: 12px; font-weight: 700;">0 PROFILES</div>
            </div>
            
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: rgba(255,255,255,0.02); text-align: left;">
                            <th style="padding: 16px 24px; font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase;">Subject</th>
                            <th style="padding: 16px 24px; font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase;">Last Recognition</th>
                            <th style="padding: 16px 24px; font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase;">Primary Anchor</th>
                            <th style="padding: 16px 24px; font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; text-align: right;">Operations</th>
                        </tr>
                    </thead>
                    <tbody id="persons-list-ajax">
                        <tr><td colspan="4" style="text-align: center; padding: 100px; color: var(--text-secondary); opacity: 0.5;">Accessing biometric registry...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<style>
    .file-drop-zone:hover { border-color: var(--accent); background: rgba(16, 163, 127, 0.05); }
    
    td { padding: 16px 24px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
    
    .subject-cell { display: flex; align-items: center; gap: 16px; }
    .subject-avatar { width: 44px; height: 44px; border-radius: 12px; object-fit: cover; border: 2px solid var(--border-color); }
    .subject-name { font-weight: 700; font-size: 15px; }

    .anchor-badge { background: rgba(16, 163, 127, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; }

    .op-btn { 
        padding: 8px 12px; 
        border-radius: 8px; 
        border: 1px solid var(--border-color); 
        background: transparent; 
        color: var(--text-primary); 
        cursor: pointer; 
        font-size: 12px; 
        transition: var(--transition);
    }
    .op-btn:hover { background: var(--bg-secondary); border-color: var(--text-secondary); }
    .op-btn.danger:hover { background: #c41e3a; border-color: #c41e3a; color: #fff; }
</style>

<script>
    document.getElementById('page-title').textContent = 'Identity Intelligence Registry';

    function updateFileLabel(input) {
        const label = document.getElementById('file-label');
        if(input.files[0]) {
            label.textContent = `SELECTED: ${input.files[0].name.toUpperCase()}`;
            label.style.display = 'block';
        }
    }

    async function loadIdentityRegistry() {
        try {
            const res = await fetch('/api/identity/profiles');
            const data = await res.json();
            const list = document.getElementById('persons-list-ajax');
            document.getElementById('registry-count').textContent = `${data.length} PROFILES`;
            
            if(!data.length) {
                list.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:100px; color:var(--text-secondary); opacity:0.5;">Biometric registry is currently empty.</td></tr>';
                return;
            }
            
            list.innerHTML = data.map(p => {
                const img = p.image_path ? `/api/snapshot_image?path=${encodeURIComponent(p.image_path)}` : 'https://ui-avatars.com/api/?name='+encodeURIComponent(p.name)+'&background=333&color=fff';
                const lastSeen = p.last_seen ? new Date(p.last_seen).toLocaleString() : 'NEVER DETECTED';
                return `
                    <tr>
                        <td>
                            <div class="subject-cell">
                                <img src="${img}" class="subject-avatar" onerror="this.src='https://ui-avatars.com/api/?name=?&background=333&color=fff'">
                                <div class="subject-name">${p.name}</div>
                            </div>
                        </td>
                        <td style="color: var(--text-secondary); font-family: monospace;">${lastSeen}</td>
                        <td><span class="anchor-badge">${p.last_camera || 'NONE'}</span></td>
                        <td style="text-align: right;">
                            <div style="display: flex; gap: 8px; justify-content: flex-end;">
                                <button class="op-btn" onclick="Router.navigate('/registered_detections?person_name=${encodeURIComponent(p.name)}')">
                                    <i class="fa-solid fa-list-check"></i> LOGS
                                </button>
                                <button class="op-btn danger" onclick="deleteIdentity('${p.id}')">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        } catch(e) { console.error('Registry load failed', e); }
    }

    document.getElementById('register-identity-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('identity-reg-btn');
        const originalText = btn.innerHTML;
        btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> ENCODING BIOMETRICS...';
        
        try {
            const res = await fetch('/api/identity/register', { method: 'POST', body: new FormData(e.target) });
            if(res.ok) {
                e.target.reset();
                document.getElementById('file-label').style.display = 'none';
                loadIdentityRegistry();
                // We assume base.html showToast is available
                if(window.showToast) showToast({target: 'Identity', camera: 'Registry', time: 'Just now', thumbnail: '/static/placeholder.jpg'});
            }
        } catch(e) {} finally {
            btn.disabled = false; btn.innerHTML = originalText;
        }
    });

    async function deleteIdentity(id) {
        if(!confirm('Permanent purge: Are you sure you want to delete this identity and all associated biometric encodings?')) return;
        try {
            await fetch(`/api/identity/profiles/${id}`, { method: 'DELETE' });
            loadIdentityRegistry();
        } catch(e) {}
    }

    loadIdentityRegistry();
</script>
{% endblock %}
