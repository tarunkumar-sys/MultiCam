<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vigilance — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --bg-surface: #0a0a0a;
            --bg-element: #121212;
            --border: rgba(255, 255, 255, 0.05);
            --text: #e5e5e5;
            --text-muted: #a1a1a1;
            --text-dim: #666666;
            --accent: #ffffff;
            --radius: 8px;
            --ease: cubic-bezier(0.2, 0, 0.2, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .split-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* ── Left Side: Visuals ─────────────────────────────────── */
        .left-side {
            flex: 1.2;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px;
            overflow: hidden;
            background: #000;
        }

        /* Animated Mesh Background */
        .mesh {
            position: absolute;
            inset: -50%;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(10, 10, 10, 1) 0%, transparent 100%);
            z-index: 0;
            animation: drift 20s infinite linear;
        }

        @keyframes drift {
            0% {
                transform: rotate(0deg) scale(1);
            }

            50% {
                transform: rotate(180deg) scale(1.1);
            }

            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        .noise {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.04;
            mix-blend-mode: overlay;
            z-index: 1;
            pointer-events: none;
        }

        .left-content {
            position: relative;
            z-index: 2;
            max-width: 440px;
        }

        .left-side .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.15em;
            color: #fff;
            opacity: 0.9;
        }

        .hero-text {
            margin-top: auto;
            margin-bottom: 40px;
        }

        .hero-text h1 {
            font-size: 32px;
            font-weight: 500;
            line-height: 1.2;
            letter-spacing: -0.03em;
            margin-bottom: 20px;
            color: #fff;
        }

        .hero-text p {
            font-size: 15px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .stats-preview {
            display: flex;
            gap: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-item .val {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 4px;
        }

        .stat-item .lab {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
        }

        /* ── Right Side: Form ───────────────────────────────────── */
        .right-side {
            width: 480px;
            background: var(--bg-surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            position: relative;
            z-index: 10;
        }

        .login-header {
            margin-bottom: 32px;
        }

        .login-header h2 {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .login-header p {
            font-size: 14px;
            color: var(--text-dim);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-element);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.15s var(--ease);
        }

        .form-group input:focus {
            border-color: rgba(255, 255, 255, 0.15);
            background: #161616;
        }

        .pwd-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
        }

        .pwd-toggle:hover {
            color: var(--text-muted);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s var(--ease);
            margin-top: 12px;
        }

        .submit-btn:hover {
            background: #e0e0e0;
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .err-msg {
            font-size: 12px;
            color: #ef4444;
            text-align: center;
            margin-top: 16px;
            min-height: 18px;
        }

        .footer-hint {
            position: absolute;
            bottom: 40px;
            left: 80px;
            font-size: 12px;
            color: var(--text-dim);
            opacity: 0.6;
        }

        @media (max-width: 1024px) {
            .left-side {
                display: none;
            }

            .right-side {
                width: 100%;
                padding: 40px;
            }

            .footer-hint {
                left: 40px;
            }
        }
    </style>
</head>

<body>
    <div class="split-container">
        <!-- Visual Section -->
        <div class="left-side">
            <div class="mesh"></div>
            <div class="noise"></div>

            <div class="left-content hero-text">
                <h1>Autonomous Intelligent Surveillance.</h1>
                <p>Advanced person detection and real-time face recognition powered by neural analysis. Experience the
                    next generation of security management.</p>
            </div>
        </div>

        <!-- Login Section -->
        <div class="right-side">
            <div class="login-header">
                <div class="brand">
                    <i class="fa-solid fa-shield-halved"></i>
                    AI VIGILANCE
                </div>
                <p>Welcome back to mission control</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="admin" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <button type="button" class="pwd-toggle" id="eye-btn">
                            <i class="fa-regular fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="sign-in-btn">Continue</button>
                <div class="err-msg" id="err-msg"></div>
            </form>

            <div class="footer-hint">
                Standard clearance: admin / admin123
            </div>
        </div>
    </div>

    <script>
        const pwdInput = document.getElementById('password');
        const eyeBtn = document.getElementById('eye-btn');
        const eyeIcon = document.getElementById('eye-icon');

        eyeBtn.addEventListener('click', () => {
            const isVisible = pwdInput.type === 'text';
            pwdInput.type = isVisible ? 'password' : 'text';
            eyeIcon.classList.toggle('fa-eye', isVisible);
            eyeIcon.classList.toggle('fa-eye-slash', !isVisible);
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sign-in-btn');
            const err = document.getElementById('err-msg');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            err.textContent = '';

            try {
                const fd = new FormData(e.target);
                const res = await fetch('/api/login', { method: 'POST', body: fd });
                const data = await res.json();

                if (data.status === 'success') {
                    window.location.href = '/';
                } else {
                    err.textContent = data.message || 'Access denied.';
                    btn.disabled = false;
                    btn.textContent = 'Continue';
                }
            } catch {
                err.textContent = 'Network error. Please retry.';
                btn.disabled = false;
                btn.textContent = 'Continue';
            }
        });
    </script>
</body>

</html>
