<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - VigiLance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #000000;
            --bg-input: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --border-color: #333333;
            --accent: #10a37f;
            --accent-hover: #1a7f64;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .login-wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* Left Side - Login Form */
        .login-form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            max-width: 600px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }

        /* Right Side - Visual Panel */
        .visual-panel {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: none;
        }

        /* Pixelated Background Pattern */
        .pixel-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(90deg, #1a1a1a 1px, transparent 1px),
                linear-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .pixel-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 30% 40%, rgba(16, 163, 127, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(16, 163, 127, 0.1) 0%, transparent 40%);
        }

        .panel-content {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .panel-logo {
            margin-bottom: 40px;
        }

        .panel-logo svg {
            width: 80px;
            height: 80px;
            color: var(--accent);
        }

        .panel-title {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            letter-spacing: -1px;
            text-align: center;
        }

        .panel-title span {
            color: var(--accent);
        }

        .panel-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            text-align: center;
            font-weight: 400;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 48px;
        }

        .logo svg {
            width: 40px;
            height: 40px;
            color: var(--accent);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .form-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .form-header p {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            padding-right: 48px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, background 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: #252525;
        }

        .form-group input::placeholder {
            color: #555;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: var(--text-primary);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
        }

        .login-btn:hover {
            background: var(--accent-hover);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            padding: 12px 14px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .error-msg.show {
            display: block;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .clock-display {
            position: fixed;
            top: 24px;
            right: 24px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            z-index: 10;
        }

        @media (min-width: 1024px) {
            .visual-panel {
                display: block;
            }
            .login-form-side {
                max-width: 50%;
            }
        }

        @media (max-width: 768px) {
            .login-form-side {
                padding: 24px;
            }
            .login-container {
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="clock-display" id="live-clock"></div>
    
    <div class="login-wrapper">
        <!-- Left Side - Visual Panel -->
        <div class="visual-panel">
            <div class="pixel-bg"></div>
            <div class="panel-content">
                <div class="panel-logo">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <rect x="4" y="4" width="16" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
                        <circle cx="12" cy="12" r="4" fill="currentColor"/>
                    </svg>
                </div>
                <div class="panel-title">AI <span>VIGILANCE</span></div>
                <div class="panel-subtitle">Intelligent Surveillance System</div>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="login-form-side">
            <div class="login-container">
                
                <div class="form-header">
                    <h1>Sign In</h1>
                    <p>Continue to access your dashboard</p>
                </div>
                
                <div class="error-msg" id="errorMsg">Invalid username or password</div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                            <i class="fa-solid fa-eye password-toggle" id="togglePassword"></i>
                        </div>
                    </div>
                    <button type="submit" class="login-btn">Sign In</button>
                </form>
                
                <div class="footer">
                    VigiLance Surveillance System v1.0
                </div>
            </div>
        </div>
    </div>

    <script>
        let _serverOffset = 0;
        async function syncServerTime() {
            try {
                const t0 = Date.now();
                const res = await fetch('/api/server_time');
                const t1 = Date.now();
                if (res.ok) {
                    const data = await res.json();
                    _serverOffset = data.timestamp_ms - t0 + Math.round((t1 - t0) / 2);
                }
            } catch(e) {}
        }

        function updateLiveClock() {
            const now = new Date(Date.now() + _serverOffset);
            const timeString = now.toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
            }).toUpperCase();
            const clockEl = document.getElementById('live-clock');
            if (clockEl) {
                clockEl.textContent = timeString + ' IST';
            }
        }

        syncServerTime().then(() => {
            updateLiveClock();
            setInterval(updateLiveClock, 1000);
            setInterval(syncServerTime, 5 * 60 * 1000);
        });

        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                });
                
                if (res.ok) {
                    window.location.href = '/';
                } else {
                    document.getElementById('errorMsg').classList.add('show');
                }
            } catch (err) {
                document.getElementById('errorMsg').textContent = 'Connection failed';
                document.getElementById('errorMsg').classList.add('show');
            }
        });
    </script>
</body>
</html>
