<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vigilance — Sign In</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="login-page">

    <div class="split-container">
        <!-- Visual Section -->
        <div class="left-side">
            <div class="mesh"></div>
            <div class="noise"></div>

            <div class="left-content hero-text">
                <h1>Autonomous Intelligent Surveillance.</h1>
                <p>Advanced person detection and real-time face recognition powered by neural analysis. Experience the
                    next generation of security management.</p>
            </div>
        </div>

        <!-- Login Section -->
        <div class="right-side">
            <div class="login-header">
                <div class="brand">
                    <i class="fa-solid fa-shield-halved"></i>
                    AI VIGILANCE
                </div>
                <p>Welcome back to mission control</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="admin" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <button type="button" class="pwd-toggle" id="eye-btn">
                            <i class="fa-regular fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="sign-in-btn">Continue</button>
                <div class="err-msg" id="err-msg"></div>
            </form>

            <div class="footer-hint">
                Standard clearance: admin / admin123
            </div>
        </div>
    </div>

    <script>
        const pwdInput = document.getElementById('password');
        const eyeBtn = document.getElementById('eye-btn');
        const eyeIcon = document.getElementById('eye-icon');

        eyeBtn.addEventListener('click', () => {
            const isVisible = pwdInput.type === 'text';
            pwdInput.type = isVisible ? 'password' : 'text';
            eyeIcon.classList.toggle('fa-eye', isVisible);
            eyeIcon.classList.toggle('fa-eye-slash', !isVisible);
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sign-in-btn');
            const err = document.getElementById('err-msg');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            err.textContent = '';

            try {
                const fd = new FormData(e.target);
                const res = await fetch('/api/login', { method: 'POST', body: fd });
                const data = await res.json();

                if (data.status === 'success') {
                    window.location.href = '/';
                } else {
                    err.textContent = data.message || 'Access denied.';
                    btn.disabled = false;
                    btn.textContent = 'Continue';
                }
            } catch {
                err.textContent = 'Network error. Please retry.';
                btn.disabled = false;
                btn.textContent = 'Continue';
            }
        });
    </script>
</body>

</html>
