<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Vigilance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
        }
        /* Left Side - Visual */
        .login-visual {
            flex: 1;
            background: linear-gradient(180deg, #e8e8e8 0%, #d0d0d0 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        /* City Skyline Background */
        .city-skyline {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" preserveAspectRatio="xMidYMax slice"><defs><linearGradient id="bldgGrad" x1="0%25" y1="0%25" x2="0%25" y2="100%25"><stop offset="0%25" style="stop-color:%23b0b0b0"/><stop offset="100%25" style="stop-color:%23808080"/></linearGradient></defs><g fill="url(%23bldgGrad)"><rect x="0" y="120" width="40" height="80"/><rect x="45" y="80" width="50" height="120"/><rect x="100" y="100" width="35" height="100"/><rect x="140" y="60" width="60" height="140"/><rect x="205" y="90" width="45" height="110"/><rect x="255" y="70" width="55" height="130"/><rect x="315" y="110" width="40" height="90"/><rect x="360" y="50" width="70" height="150"/><rect x="435" y="85" width="50" height="115"/><rect x="490" y="65" width="60" height="135"/><rect x="555" y="95" width="45" height="105"/><rect x="605" y="75" width="65" height="125"/><rect x="675" y="105" width="40" height="95"/><rect x="720" y="55" width="75" height="145"/><rect x="800" y="90" width="50" height="110"/><rect x="855" y="70" width="55" height="130"/><rect x="915" y="100" width="45" height="100"/><rect x="965" y="60" width="65" height="140"/><rect x="1035" y="85" width="50" height="115"/><rect x="1090" y="110" width="40" height="90"/><rect x="1135" y="75" width="65" height="125"/></g></svg>');
            background-size: cover;
            background-position: bottom;
            background-repeat: no-repeat;
            z-index: 1;
        }
        /* Hikvision Logo Style */
        .brand-logo {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 10;
        }
        .brand-logo-text {
            font-size: 28px;
            font-weight: bold;
            color: #c41e3a;
            letter-spacing: 1px;
        }
        .brand-logo-text span {
            color: #333;
            font-weight: 300;
        }
        /* Camera Graphic Container */
        .camera-container {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Large Camera Lens */
        .camera-lens-outer {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: linear-gradient(145deg, #3a3a4a 0%, #2a2a3a 50%, #1a1a2a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.4),
                inset 0 0 40px rgba(0,0,0,0.3);
            position: relative;
        }
        .camera-lens-outer::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border-radius: 50%;
            background: linear-gradient(145deg, #4a4a5a 0%, #3a3a4a 50%, #2a2a3a 100%);
        }
        .camera-lens-inner {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: linear-gradient(145deg, #1a1a2e 0%, #0d0d1a 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }
        .camera-lens-glass {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, 
                rgba(100, 150, 200, 0.4) 0%,
                rgba(50, 80, 120, 0.6) 20%,
                rgba(20, 40, 60, 0.8) 40%,
                rgba(10, 20, 30, 0.95) 70%,
                #050510 100%);
            position: relative;
            box-shadow: 
                inset 0 0 40px rgba(0,0,0,0.9),
                0 0 20px rgba(100, 150, 200, 0.2);
        }
        .camera-lens-glass::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 30%;
            height: 25%;
            background: radial-gradient(ellipse, rgba(255,255,255,0.3) 0%, transparent 70%);
            border-radius: 50%;
            transform: rotate(-30deg);
        }
        .camera-lens-glass::after {
            content: '';
            position: absolute;
            bottom: 20%;
            right: 25%;
            width: 15%;
            height: 15%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        /* Lens Aperture */
        .lens-aperture {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, 
                rgba(196, 30, 58, 0.3) 0%,
                rgba(100, 20, 40, 0.5) 40%,
                transparent 70%);
        }
        /* Product Name */
        .product-name {
            margin-top: 40px;
            font-size: 36px;
            font-weight: bold;
            color: #333;
            text-align: center;
            z-index: 10;
        }
        .product-name span {
            color: #c41e3a;
        }
        .product-tagline {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
            text-align: center;
            z-index: 10;
        }
        /* Right Side - Login Form */
        .login-form-section {
            width: 400px;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px;
            box-shadow: -10px 0 40px rgba(0,0,0,0.1);
        }
        .form-header {
            margin-bottom: 40px;
            text-align: center;
        }
        .form-header h2 {
            font-size: 22px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-header p {
            color: #888;
            font-size: 13px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #555;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            font-size: 14px;
            color: #333;
            transition: all 0.2s;
            background: #fafafa;
        }
        .form-group input:focus {
            outline: none;
            border-color: #c41e3a;
            background: #fff;
        }
        .form-group input::placeholder {
            color: #aaa;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #c41e3a;
            color: #fff;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 15px;
            border-radius: 3px;
        }
        .login-btn:hover {
            background: #a01830;
        }
        .forgot-password {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
        }
        .forgot-password a {
            color: #888;
            text-decoration: none;
        }
        .forgot-password a:hover {
            color: #c41e3a;
        }
        .error-msg {
            background: #fee;
            color: #c33;
            padding: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            border-left: 3px solid #c33;
        }
        .error-msg.show {
            display: block;
        }
        .form-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 11px;
            color: #aaa;
        }
        /* Responsive */
        @media (max-width: 900px) {
            .login-visual {
                display: none;
            }
            .login-form-section {
                width: 100%;
                max-width: 400px;
                margin: 0 auto;
                box-shadow: none;
            }
            body {
                background: #fff;
                justify-content: center;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <!-- Left Side - Visual -->
    <div class="login-visual">
        <!-- Brand Logo -->
        <div class="brand-logo">
            <div class="brand-logo-text">AI<span>VIGILANCE</span></div>
        </div>
        
        <!-- Camera Container -->
        <div class="camera-container">
            <div class="camera-lens-outer">
                <div class="camera-lens-inner">
                    <div class="camera-lens-glass">
                        <div class="lens-aperture"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Product Name -->
        <div class="product-name">AI <span>VIGILANCE</span></div>
        <div class="product-tagline">Intelligent Surveillance System</div>
        
        <!-- City Skyline -->
        <div class="city-skyline"></div>
    </div>

    <!-- Right Side - Login Form -->
    <div class="login-form-section">
        <div class="form-header">
            <h2>Welcome Back</h2>
            <p>Please login to access the system</p>
        </div>
        <div class="error-msg" id="errorMsg">Invalid username or password</div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
            <div class="forgot-password">
                <a href="#">Forgot password?</a>
            </div>
        </form>
        <div class="form-footer">
            AI Vigilance Surveillance System v1.0
        </div>
    </div>

    <script>
        // --- Server-Synced IST Clock ---
        let _serverOffset = 0; // ms difference between server IST and browser local
        async function syncServerTime() {
            try {
                const t0 = Date.now();
                const res = await fetch('/api/server_time');
                const t1 = Date.now();
                if (res.ok) {
                    const data = await res.json();
                    const serverMs = data.timestamp_ms;
                    const rtt = t1 - t0;
                    _serverOffset = serverMs - t0 + Math.round(rtt / 2);
                }
            } catch(e) { /* silent — keep using last offset */ }
        }
        function getServerIST() {
            const serverMs = Date.now() + _serverOffset;
            return new Date(serverMs);
        }
        function updateLiveClock() {
            const now = getServerIST();
            const timeString = now.toLocaleString('en-IN', {
                timeZone: 'Asia/Kolkata',
                year: 'numeric', month: 'short', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: true
            });
            const clockEl = document.getElementById('live-clock');
            if (clockEl) {
                clockEl.textContent = '🕐 ' + timeString + ' IST';
            }
        }
        syncServerTime().then(() => {
            updateLiveClock();
            setInterval(updateLiveClock, 1000);
            setInterval(syncServerTime, 5 * 60 * 1000); // resync every 5 min
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                });
                
                if (res.ok) {
                    window.location.href = '/';
                } else {
                    document.getElementById('errorMsg').classList.add('show');
                }
            } catch (err) {
                document.getElementById('errorMsg').textContent = 'Login failed. Please try again.';
                document.getElementById('errorMsg').classList.add('show');
            }
        });
    </script>
</body>
</html>
