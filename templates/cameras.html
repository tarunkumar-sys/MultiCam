<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vigilance - Cameras</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">AI VIGILANCE</div>
        <nav>
            <a href="/">Feeds</a>
            <a href="/people">People</a>
            <a href="/cameras" class="active">Cameras</a>
            <a href="/search">Search</a>
            <a href="/recordings_page">Recordings</a>
            <a href="/analytics">Analytics</a>
        </nav>
    </header>
    <main>
        <div class="sidebar" style="width:100%; max-width:600px;">
            <section class="add-camera">
                <div class="section-title">
                    <h2>Add Camera</h2>
                </div>
                <form id="camera-form" style="display:flex; flex-direction:column; gap:0.5rem;">
                    <input type="text" name="camera_id" placeholder="Camera Name (e.g. Cam1)" required>
                    <select name="camera_type" id="camera-type" style="margin-bottom:0;">
                        <option value="webcam">Local Webcam</option>
                        <option value="rtsp">RTSP Stream</option>
                        <option value="ipwebcam">IP Webcam App (Android)</option>
                        <option value="droidcam">DroidCam</option>
                    </select>
                    <input type="text" name="source" id="camera-source" placeholder="Camera Index (e.g. 0)" style="margin-bottom:1rem;" required>
                    <button type="submit" class="btn-primary"><i class="fa-solid fa-plug"></i> Connect</button>
                </form>
            </section>
        </div>
        <div class="dashboard">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
                <h2 style="margin:0;">Active Cameras</h2>
            </div>
            <ul id="active-cameras-list" style="list-style: none; padding: 0;">
                <li style="color:var(--text-muted);">Loading cameras...</li>
            </ul>
            <div style="margin-top:2rem;">
                <div class="section-title">
                    <h2>Occupancy Log</h2>
                </div>
                <div class="filter-controls">
                    <select id="occ-camera-select" style="min-width: 200px; margin-bottom: 0;">
                        <option value="">All Cameras</option>
                    </select>
                    <label style="color:var(--text-muted); font-size:0.85rem;">From</label>
                    <input type="datetime-local" id="occ-start" style="margin-bottom: 0;">
                    <label style="color:var(--text-muted); font-size:0.85rem;">To</label>
                    <input type="datetime-local" id="occ-end" style="margin-bottom: 0;">
                    <button id="occ-load-btn" class="btn-secondary">Load</button>
                    <button id="occ-delete-all-btn" class="btn-danger">Delete All</button>
                </div>
                <div id="occ-results" style="overflow:auto; border-radius: 8px; border: 1px solid var(--card-border); background: var(--card-bg);">
                    <table style="width:100%; border-collapse:collapse; text-align: left;">
                        <thead style="background: #000000; border-bottom: 1px solid var(--card-border);">
                            <tr>
                                <th style="padding:1rem; color:var(--text-muted); font-size: 0.85rem; font-weight: 600; text-transform:uppercase;">Time</th>
                                <th style="padding:1rem; color:var(--text-muted); font-size: 0.85rem; font-weight: 600; text-transform:uppercase;">Camera</th>
                                <th style="padding:1rem; color:var(--text-muted); font-size: 0.85rem; font-weight: 600; text-transform:uppercase;">Count</th>
                                <th style="padding:1rem; width:80px; color:var(--text-muted); font-size: 0.85rem; font-weight: 600; text-transform:uppercase;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="occ-tbody">
                            <tr><td style="padding:1rem; color:var(--text-muted);" colspan="4">No data</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <script src="/static/script.js?v=2"></script>
</body>
</html>
