{% extends base_template %}

{% block content %}
<div class="analytics-wrapper" style="padding: 32px; height: 100%; overflow-y: auto;">
    <div class="header-section" style="margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
            <h2 style="font-size: 32px; font-weight: 800; letter-spacing: -1px;">Trend Analytics</h2>
            <p style="color: var(--text-secondary); font-size: 15px;">Historical traffic patterns and behavioral intelligence.</p>
        </div>
        <div class="filter-box" style="background: var(--bg-panel); padding: 8px 16px; border-radius: 12px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px;">
            <i class="fa-solid fa-filter" style="color: var(--accent); font-size: 13px;"></i>
            <select id="camera-filter" onchange="loadAnalytics()" style="background: transparent; border: none; color: #fff; font-weight: 700; font-size: 13px; outline: none; cursor: pointer;">
                <option value="">Global Network</option>
            </select>
        </div>
    </div>

    <!-- Analytics Key Metrics -->
    <div class="metrics-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 40px;">
        <div class="card" style="padding: 24px;">
            <div style="font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px;">Peak Engagement</div>
            <div style="font-size: 28px; font-weight: 800;" id="peak-val">--</div>
            <div style="font-size: 12px; color: var(--accent); font-weight: 700; margin-top: 8px;" id="peak-time">SYNCING...</div>
        </div>
        <div class="card" style="padding: 24px;">
            <div style="font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px;">Average Saturation</div>
            <div style="font-size: 28px; font-weight: 800;" id="avg-val">--</div>
            <div style="font-size: 12px; color: var(--text-secondary); font-weight: 700; margin-top: 8px;">PERSONS / HOUR</div>
        </div>
        <div class="card" style="padding: 24px;">
            <div style="font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px;">Weekly Volume</div>
            <div style="font-size: 28px; font-weight: 800;" id="weekly-val">--</div>
            <div style="font-size: 12px; color: var(--accent); font-weight: 700; margin-top: 8px;">TOTAL DETECTIONS</div>
        </div>
    </div>

    <!-- Charts Section -->
    <div class="charts-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 32px;">
        <div class="card" style="padding: 32px;">
            <h4 style="margin-bottom: 24px; font-size: 16px; font-weight: 700;">Hourly Traffic Pattern</h4>
            <div style="height: 320px; position: relative;">
                <canvas id="hourlyChart"></canvas>
            </div>
        </div>
        <div class="card" style="padding: 32px;">
            <h4 style="margin-bottom: 24px; font-size: 16px; font-weight: 700;">7-Day Growth Trend</h4>
            <div style="height: 320px; position: relative;">
                <canvas id="dailyChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('page-title').textContent = 'Intelligence & Trend Analytics';

    let hourlyChart = null;
    let dailyChart = null;

    async function loadAnalytics() {
        const camId = document.getElementById('camera-filter').value;
        try {
            const hRes = await fetch(`/api/analytics/hourly?camera_id=${camId}`);
            const hData = await hRes.json();
            const dRes = await fetch(`/api/analytics/daily?camera_id=${camId}&days=7`);
            const dData = await dRes.json();
            
            updateMetrics(hData, dData);
            renderCharts(hData, dData);
        } catch (e) { console.error('Analytics load error', e); }
    }

    function updateMetrics(hData, dData) {
        if(!hData.length) return;
        const peak = hData.reduce((max, d) => d.count > max.count ? d : max, hData[0]);
        document.getElementById('peak-val').textContent = peak.count;
        document.getElementById('peak-time').textContent = `AT ${peak.label.toUpperCase()}`;
        
        const avg = (hData.reduce((s,d) => s + d.count, 0) / (hData.length || 1)).toFixed(1);
        document.getElementById('avg-val').textContent = avg;
        
        const weekly = dData.reduce((s,d) => s + d.count, 0);
        document.getElementById('weekly-val').textContent = weekly;
    }

    function renderCharts(hData, dData) {
        const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
        const border = getComputedStyle(document.documentElement).getPropertyValue('--border-color').trim();
        const text = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim();

        Chart.defaults.color = text;
        Chart.defaults.font.family = "'Inter', sans-serif";

        if(hourlyChart) hourlyChart.destroy();
        hourlyChart = new Chart(document.getElementById('hourlyChart'), {
            type: 'bar',
            data: {
                labels: hData.map(d => d.label),
                datasets: [{
                    label: 'Detection Volume',
                    data: hData.map(d => d.count),
                    backgroundColor: accent,
                    borderRadius: 6,
                    hoverBackgroundColor: '#fff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, border: { display: false } },
                    y: { grid: { color: border }, border: { display: false }, beginAtZero: true }
                }
            }
        });

        if(dailyChart) dailyChart.destroy();
        dailyChart = new Chart(document.getElementById('dailyChart'), {
            type: 'line',
            data: {
                labels: dData.map(d => d.date),
                datasets: [{
                    label: 'Volume',
                    data: dData.map(d => d.count),
                    borderColor: accent,
                    backgroundColor: 'rgba(16, 163, 127, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 4,
                    pointBackgroundColor: accent,
                    borderWidth: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, border: { display: false } },
                    y: { grid: { color: border }, border: { display: false }, beginAtZero: true }
                }
            }
        });
    }

    async function populateCameras() {
        const res = await fetch('/api/cameras');
        const cams = await res.json();
        const sel = document.getElementById('camera-filter');
        cams.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id; opt.textContent = c.id;
            sel.appendChild(opt);
        });
    }

    populateCameras();
    loadAnalytics();
</script>
{% endblock %}
