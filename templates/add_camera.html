{% extends base_template %}

{% block content %}
<div class="content" style="padding: 40px; overflow-y: auto; background: var(--bg-secondary);">
    <div class="content-grid" style="max-width: 500px; margin: 0 auto;">
        <div class="panel"
            style="background: var(--bg-panel); border-radius: 16px; border: 1px solid var(--border-color); box-shadow: var(--shadow); overflow: hidden;">
            <div class="panel-header"
                style="background: var(--accent); padding: 24px; color: white; font-weight: 700; font-size: 1.1rem; text-align: center;">
                NODE CONFIGURATION
            </div>
            <div class="panel-body" style="padding: 32px;">
                <form id="camera-form-ajax">
                    <div class="form-group" style="margin-bottom: 24px;">
                        <label
                            style="display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">IDENTIFIER</label>
                        <input type="text" name="camera_id" placeholder="e.g. Zone-A Entrance" required
                            style="width: 100%; padding: 12px 16px; background: var(--bg-secondary); border: 1.5px solid var(--border-color); border-radius: 10px; color: var(--text-primary); font-size: 0.95rem; outline: none;">
                    </div>
                    <div class="form-group" style="margin-bottom: 24px;">
                        <label
                            style="display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">PROTOCOL
                            TYPE</label>
                        <select name="camera_type" id="camera-type-select"
                            style="width: 100%; padding: 12px 16px; background: var(--bg-secondary); border: 1.5px solid var(--border-color); border-radius: 10px; color: var(--text-primary); font-size: 0.95rem; outline: none;">
                            <option value="webcam">Local Media Engine (Webcam)</option>
                            <option value="rtsp">Network Stream (RTSP/ONVIF)</option>
                            <option value="ipwebcam">IP Sensor Array</option>
                            <option value="droidcam">Mobile Link</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 24px;">
                        <label
                            style="display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">SOURCE
                            / ENDPOINT</label>
                        <input type="text" name="source" id="camera-source-input" placeholder="e.g. 0 or rtsp://..."
                            required
                            style="width: 100%; padding: 12px 16px; background: var(--bg-secondary); border: 1.5px solid var(--border-color); border-radius: 10px; color: var(--text-primary); font-size: 0.95rem; outline: none;">
                    </div>
                    <button type="submit" class="btn-submit"
                        style="width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(196, 30, 58, 0.2);">
                        INITIALIZE CAMERA
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('page-title').textContent = 'Register New Surveillance Node';

    document.getElementById('camera-form-ajax').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Initializing...';

        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData);

        try {
            const res = await fetch('/api/cameras', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: data.camera_id, source: data.source, name: data.camera_id })
            });

            const result = await res.json();
            if (result.status === 'success') {
                showToast({ target: data.camera_id, camera: 'System', time: 'Just now', thumbnail: '/static/placeholder.jpg' });
                e.target.reset();
            } else {
                alert('Registration Failed: ' + (result.message || 'Unknown Error'));
            }
        } catch (err) {
            alert('Connection Error: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = originalText;
        }
    });
</script>
{% endblock %}
