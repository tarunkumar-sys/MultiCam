{% extends base_template %}

{% block content %}
<div class="logs-wrapper" style="padding: 32px; height: 100%; overflow-y: auto;">
    <div class="header-section" style="margin-bottom: 32px; display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
            <h2 style="font-size: 28px; font-weight: 800; letter-spacing: -0.5px;">System Audit Logs</h2>
            <p style="color: var(--text-secondary); font-size: 14px;">Cryptographically hashed event sequence for forensic auditing.</p>
        </div>
        <div class="filter-panel" style="display: flex; gap: 16px; align-items: center; background: var(--bg-panel); padding: 8px 16px; border-radius: 12px; border: 1px solid var(--border-color);">
            <div class="f-group">
                <label style="font-size: 10px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase;">Sensor</label>
                <select id="camera-filter-logs" onchange="loadDetectionLogs(1)" style="background: transparent; border: none; color: #fff; font-weight: 700; outline: none; cursor: pointer;">
                    <option value="">ALL SECTORS</option>
                </select>
            </div>
            <div style="width: 1px; height: 24px; background: var(--border-color);"></div>
            <div class="f-group">
                <label style="font-size: 10px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase;">Density</label>
                <select id="pageSizeSelect" onchange="loadDetectionLogs(1)" style="background: transparent; border: none; color: #fff; font-weight: 700; outline: none; cursor: pointer;">
                    <option value="20">20/PAGE</option>
                    <option value="50">50/PAGE</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Audit Table -->
    <div class="card" style="overflow: hidden;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background: rgba(255,255,255,0.02); text-align: left;">
                    <th style="padding: 16px 24px; font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase;">Event Timestamp</th>
                    <th style="padding: 16px 24px; font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase;">Source ID</th>
                    <th style="padding: 16px 24px; font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase;">Entity Density</th>
                    <th style="padding: 16px 24px; font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; text-align: right;">Evidence</th>
                </tr>
            </thead>
            <tbody id="logsBody-ajax">
                <tr><td colspan="4" style="text-align: center; padding: 100px; color: var(--text-secondary); opacity: 0.5;">Loading temporal audit chain...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div id="paginationBar-ajax" style="display: none; margin-top: 24px; justify-content: space-between; align-items: center;">
        <div id="pageInfo-ajax" style="font-size: 13px; color: var(--text-secondary); font-weight: 600;"></div>
        <div id="pageControls-ajax" style="display: flex; gap: 8px;"></div>
    </div>
</div>

<!-- Modal: Evidence Inspection -->
<div id="imageModalLogs" class="modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(20px);">
    <div class="inspection-container" style="width: 90vw; height: 85vh; display: flex; background: var(--bg-panel); border-radius: 24px; overflow: hidden; border: 1px solid var(--border-color); box-shadow: 0 0 100px rgba(0,0,0,0.8);">
        <div class="inspection-main" style="flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center;">
            <img id="modalImageLogs" src="" style="max-width: 100%; max-height: 100%; object-fit: contain;">
            <button onclick="closeLogModal()" style="position: absolute; top: 24px; right: 24px; background: rgba(0,0,0,0.5); border: none; color: #fff; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 20px;"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="inspection-sidebar" style="width: 320px; background: var(--bg-sidebar); border-left: 1px solid var(--border-color); display: flex; flex-direction: column;">
            <div style="padding: 24px; border-bottom: 1px solid var(--border-color);">
                <h4 style="font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Neural Crops</h4>
                <p style="font-size: 11px; color: var(--text-secondary); margin-top: 4px;">Extracted biometric features from this event.</p>
            </div>
            <div id="modalCrops" style="flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;"></div>
        </div>
    </div>
</div>

<style>
    td { padding: 16px 24px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
    
    .op-btn { 
        padding: 6px 16px; 
        border-radius: 8px; 
        border: 1px solid var(--border-color); 
        background: transparent; 
        color: var(--text-primary); 
        cursor: pointer; 
        font-size: 12px; 
        font-weight: 700;
        transition: var(--transition);
    }
    .op-btn:hover { border-color: var(--accent); background: rgba(16, 163, 127, 0.1); }

    .crop-item {
        width: 100%;
        border-radius: 12px;
        border: 2px solid var(--border-color);
        transition: var(--transition);
    }
    .crop-item:hover { border-color: var(--accent); transform: scale(1.02); }

    .pag-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-panel); color: #fff; font-weight: 700; cursor: pointer; }
    .pag-btn:disabled { opacity: 0.3; cursor: not-allowed; }
</style>

<script>
    document.getElementById('page-title').textContent = 'System Temporal Audit';

    let currentLogPage = 1;

    async function loadDetectionLogs(page = 1) {
        currentLogPage = page;
        const cam = document.getElementById('camera-filter-logs').value;
        const size = document.getElementById('pageSizeSelect').value;
        const skip = (page - 1) * size;
        
        const body = document.getElementById('logsBody-ajax');
        body.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 100px;"><i class="fa-solid fa-microchip fa-spin"></i></td></tr>';

        try {
            const res = await fetch(`/api/search/snapshots?limit=${size}&skip=${skip}${cam ? '&camera_id='+cam : ''}`);
            const data = await res.json();
            const items = data.items || [];
            const total = data.total || 0;
            
            renderLogRows(items);
            renderLogPagination(total, size);
        } catch(e) { console.error('Log fetch failed', e); }
    }

    function renderLogRows(items) {
        const body = document.getElementById('logsBody-ajax');
        if(!items.length) {
            body.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 100px; color: var(--text-secondary); opacity: 0.5;">Audit chain is empty for the current filter.</td></tr>';
            return;
        }
        body.innerHTML = items.map(log => {
            const date = new Date(log.timestamp).toLocaleString();
            return `
                <tr>
                    <td style="font-family: monospace; font-weight: 700;">${date}</td>
                    <td><span style="background: var(--bg-secondary); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800;">${log.camera_id}</span></td>
                    <td style="color: var(--text-secondary); font-weight: 700;">${log.person_count} IDENTITIES</td>
                    <td style="text-align: right;">
                        <button class="op-btn" onclick='openLogModal(${JSON.stringify(log).replace(/'/g, "&apos;")})'>INSPECT</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function renderLogPagination(total, size) {
        const bar = document.getElementById('paginationBar-ajax');
        const info = document.getElementById('pageInfo-ajax');
        const ctrl = document.getElementById('pageControls-ajax');
        const pages = Math.ceil(total / size);
        
        if(pages <= 1) { bar.style.display = 'none'; return; }
        bar.style.display = 'flex';
        info.textContent = `PAGE ${currentLogPage} OF ${pages}`;
        
        ctrl.innerHTML = `
            <button class="pag-btn" onclick="loadDetectionLogs(${currentLogPage-1})" ${currentLogPage === 1 ? 'disabled' : ''}>PREV</button>
            <button class="pag-btn" onclick="loadDetectionLogs(${currentLogPage+1})" ${currentLogPage === pages ? 'disabled' : ''}>NEXT</button>
        `;
    }

    function openLogModal(log) {
        document.getElementById('modalImageLogs').src = `/api/snapshot_image?path=${encodeURIComponent(log.snapshot_path)}`;
        const crops = document.getElementById('modalCrops');
        crops.innerHTML = '';
        (log.person_crops || []).forEach(path => {
            const img = document.createElement('img');
            img.src = `/api/snapshot_image?path=${encodeURIComponent(path)}`;
            img.className = 'crop-item';
            crops.appendChild(img);
        });
        document.getElementById('imageModalLogs').style.display = 'flex';
    }

    function closeLogModal() {
        document.getElementById('imageModalLogs').style.display = 'none';
    }

    async function populateCams() {
        const res = await fetch('/api/cameras');
        const cams = await res.json();
        const sel = document.getElementById('camera-filter-logs');
        cams.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id; opt.textContent = c.id;
            sel.appendChild(opt);
        });
    }

    populateCams();
    loadDetectionLogs();
</script>
{% endblock %}
