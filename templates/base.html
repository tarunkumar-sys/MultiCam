<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Vigilance: Intelligent multi-camera surveillance with real-time face recognition and analytics.">
    <title>{% block title %}AI Vigilance{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% block head %}{% endblock %}
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sb-top">
            <div class="sb-logo">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <span class="sb-logo-text">AI VIGILANCE</span>
        </div>

        <nav class="sb-nav">
            <a href="/" class="sb-link {% block nav_feed %}{% endblock %}" title="Feed">
                <i class="fa-solid fa-tv"></i>
                <span class="sb-label">Feed</span>
            </a>
            <a href="/cameras" class="sb-link {% block nav_camera %}{% endblock %}" title="Cameras">
                <i class="fa-solid fa-video"></i>
                <span class="sb-label">Cameras</span>
            </a>
            <a href="/recordings_page" class="sb-link {% block nav_recordings %}{% endblock %}" title="Recordings">
                <i class="fa-solid fa-circle-dot"></i>
                <span class="sb-label">Recordings</span>
            </a>
            <a href="/analytics" class="sb-link {% block nav_analytics %}{% endblock %}" title="Analytics">
                <i class="fa-solid fa-chart-line"></i>
                <span class="sb-label">Analytics</span>
            </a>
            <a href="/people" class="sb-link {% block nav_people %}{% endblock %}" title="People">
                <i class="fa-solid fa-users"></i>
                <span class="sb-label">People</span>
            </a>
            <a href="/search" class="sb-link {% block nav_search %}{% endblock %}" title="Search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span class="sb-label">Search</span>
            </a>
            <a href="/logs" class="sb-link {% block nav_logs %}{% endblock %}" title="Logs">
                <i class="fa-solid fa-list"></i>
                <span class="sb-label">Logs</span>
            </a>
        </nav>

        <div class="sb-bottom">
            <button class="sb-link" title="Alerts" onclick="toggleAlertPanel()">
                <i class="fa-solid fa-bell"></i>
                <span class="sb-label">Alerts</span>
                <span class="alert-badge" id="alert-badge" style="display:none;">0</span>
            </button>
            <button class="sb-link" title="Settings" onclick="openSettings()">
                <i class="fa-solid fa-gear"></i>
                <span class="sb-label">Settings</span>
            </button>
            <button class="sb-link sb-expand-btn" id="sb-toggle" title="Toggle Sidebar" onclick="toggleSidebar()">
                <i class="fa-solid fa-angles-right" id="sb-toggle-icon"></i>
                <span class="sb-label">Collapse</span>
            </button>
        </div>
    </aside>

    <div class="alert-panel" id="alert-panel">
        <div class="alert-panel-header">
            <h3>Alerts</h3>
            <button onclick="markAllRead()" class="alert-clear-btn">Mark read</button>
        </div>
        <div class="alert-panel-body" id="alert-list">
            <p class="alert-empty">No active alerts</p>
        </div>
    </div>

    <main class="main-content" id="main-content">
        {% block content %}{% endblock %}
    </main>

    <div class="modal-overlay" id="settings-modal">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="modal-close" onclick="closeSettings()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="settings-form" autocomplete="off">
                    <div class="modal-section">
                        <h4>Admin Settings</h4>
                        <p class="modal-hint">Update system credentials.</p>
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="set-new-user" name="new_username" placeholder="New username" required>
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="set-new-pass" name="new_password" placeholder="New password" required>
                    </div>
                    <div class="form-divider"></div>
                    <div class="form-group">
                        <label>Current Password <span class="required">*</span></label>
                        <input type="password" id="set-current-pass" name="current_password" placeholder="Confirm current password" required>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-ghost" onclick="closeSettings()">Cancel</button>
                        <button type="submit" class="btn btn-accent" id="save-settings-btn">
                            Save Changes
                        </button>
                    </div>
                    <div id="settings-msg" class="settings-msg"></div>
                </form>
                <div class="form-divider"></div>
                <button class="btn btn-danger-outline" onclick="logout()" style="width:100%;">
                    Log Out
                </button>
            </div>
        </div>
    </div>

    <div class="lightbox-modal" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()"><i class="fa-solid fa-xmark"></i></button>
        <div class="lightbox-content">
            <div class="lightbox-image-container">
                <div class="flex-col items-center gap-sm">
                    <span style="font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">Full Frame</span>
                    <img id="lightbox-full-img" class="lightbox-main-img" src="" alt="Full Snapshot">
                </div>
                <div class="flex-col items-center gap-sm">
                    <span style="font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">Face Detection</span>
                    <img id="lightbox-face-img" class="lightbox-side-img" src="" alt="Face Crop">
                </div>
            </div>
            <div class="lightbox-meta" id="lightbox-meta"></div>
        </div>
        <div class="lightbox-nav">
            <button id="lb-prev" onclick="changeLightbox(-1)"><i class="fa-solid fa-chevron-left"></i></button>
            <button id="lb-next" onclick="changeLightbox(1)"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </div>

    <script src="/static/script.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
