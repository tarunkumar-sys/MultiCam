{% extends base_template %}

{% block content %}
<div class="journey-container" style="display: flex; height: 100%; overflow: hidden;">
    <!-- Active Probe Sidebar -->
    <div class="probe-sidebar" style="width: 340px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column;">
        <div style="padding: 24px; border-bottom: 1px solid var(--border-color);">
            <h3 style="font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--accent);">Active Probes</h3>
            <p style="font-size: 11px; color: var(--text-secondary); margin-top: 4px;">Dynamic entities currently tracked in-field.</p>
        </div>
        <div id="target-list-ajax" style="flex: 1; overflow-y: auto; padding: 16px;">
            <div style="text-align: center; padding: 60px; color: var(--text-secondary); opacity: 0.5;">
                <i class="fa-solid fa-satellite-dish fa-spin" style="font-size: 24px; margin-bottom: 16px;"></i>
                <p>Scanning sectors...</p>
            </div>
        </div>
    </div>

    <!-- Journey Reconstruction Area -->
    <div class="journey-viewer" style="flex: 1; overflow-y: auto; background: var(--bg-main); padding: 48px;">
        <div id="journey-header" style="max-width: 900px; margin: 0 auto 60px auto;">
            <h2 style="font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px;">Spatial Trajectory Path</h2>
            <div style="display: flex; align-items: center; gap: 16px;">
                <div style="height: 1px; flex: 1; background: var(--border-color);"></div>
                <div style="font-size: 12px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px;">Neural Reconstruction</div>
                <div style="height: 1px; flex: 1; background: var(--border-color);"></div>
            </div>
        </div>

        <div id="journey-body" style="max-width: 900px; margin: 0 auto;">
            <div style="text-align: center; padding: 120px; color: var(--text-secondary); border: 2px dashed var(--border-color); border-radius: 24px; background: rgba(255,255,255,0.01);">
                <i class="fa-solid fa-route" style="font-size: 64px; margin-bottom: 24px; opacity: 0.1;"></i>
                <h3 style="color: var(--text-primary); font-weight: 700;">Trajectory Offline</h3>
                <p>Select an active probe from the sidebar to reconstruct its movement history.</p>
            </div>
        </div>
    </div>
</div>

<style>
    .target-card-probe {
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        padding: 16px;
        border-radius: 12px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .target-card-probe:hover { border-color: var(--accent); background: var(--bg-secondary); }
    .target-card-probe.active { border-color: var(--accent); background: rgba(16, 163, 127, 0.1); box-shadow: 0 4px 15px rgba(16, 163, 127, 0.1); }

    .probe-icon {
        width: 44px;
        height: 44px;
        background: var(--bg-secondary);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        color: var(--accent);
        border: 1px solid var(--border-color);
    }

    .trajectory-step {
        position: relative;
        padding-left: 60px;
        margin-bottom: 48px;
        animation: fadeIn 0.5s ease-out forwards;
        opacity: 0;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .step-marker {
        position: absolute;
        left: 0;
        top: 10px;
        width: 24px;
        height: 24px;
        background: var(--bg-main);
        border: 4px solid var(--accent);
        border-radius: 50%;
        z-index: 2;
        box-shadow: 0 0 15px var(--accent);
    }

    .step-line {
        position: absolute;
        left: 11px;
        top: 34px;
        bottom: -44px;
        width: 2px;
        background: var(--border-color);
        z-index: 1;
    }

    .trajectory-step:last-child .step-line { display: none; }

    .step-card {
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        overflow: hidden;
        display: flex;
        box-shadow: var(--shadow);
        transition: var(--transition);
    }

    .step-card:hover { border-color: var(--accent); }

    .step-img {
        width: 280px;
        aspect-ratio: 16/9;
        object-fit: cover;
        border-right: 1px solid var(--border-color);
    }

    .step-content { padding: 24px; flex: 1; display: flex; flex-direction: column; }
    .step-time { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .step-loc { color: var(--accent); font-weight: 700; margin-top: 4px; font-size: 14px; }
</style>

<script>
    document.getElementById('page-title').textContent = 'Neural Trajectory Analysis';

    async function loadActiveTargets() {
        try {
            const res = await fetch('/api/analytics/active_targets');
            const data = await res.json();
            const list = document.getElementById('target-list-ajax');
            
            if(!data.length) {
                list.innerHTML = '<div style="text-align:center; padding:60px; color:var(--text-secondary); opacity:0.5;">No active probes identified in the current sector.</div>';
                return;
            }
            
            list.innerHTML = data.map(t => `
                <div class="target-card-probe" onclick="reconstructJourney('${t.id}', this)">
                    <div class="probe-icon">${t.id[0].toUpperCase()}</div>
                    <div style="flex: 1;">
                        <div style="font-weight: 700; font-size: 14px;">${t.id}</div>
                        <div style="font-size: 11px; color: var(--text-secondary);">Last seen: ${new Date(t.last_seen).toLocaleTimeString()}</div>
                    </div>
                    <i class="fa-solid fa-chevron-right" style="font-size: 12px; opacity: 0.3;"></i>
                </div>
            `).join('');
        } catch(e) {}
    }

    async function reconstructJourney(id, el) {
        document.querySelectorAll('.target-card-probe').forEach(c => c.classList.remove('active'));
        el.classList.add('active');

        const body = document.getElementById('journey-body');
        body.innerHTML = `
            <div style="text-align:center; padding:120px; color:var(--text-secondary);">
                <i class="fa-solid fa-circle-notch fa-spin" style="font-size:48px; margin-bottom:24px;"></i>
                <p>Synthesizing spatial intelligence for <b>${id}</b>...</p>
            </div>
        `;
        
        try {
            const res = await fetch(`/api/analytics/target_journey/${id}`);
            const data = await res.json();
            
            if(!data.length) {
                body.innerHTML = '<div style="text-align:center; padding:120px; opacity:0.5;">Incomplete trajectory data. Path reconstruction aborted.</div>';
                return;
            }
            
            body.innerHTML = data.map((step, i) => `
                <div class="trajectory-step" style="animation-delay: ${i * 0.1}s">
                    <div class="step-marker"></div>
                    <div class="step-line"></div>
                    <div class="step-card">
                        <img src="/api/snapshot_image?path=${encodeURIComponent(step.snapshot_path)}" class="step-img" onerror="this.src='https://ui-avatars.com/api/?name=?&background=333&color=fff'">
                        <div class="step-content">
                            <div class="step-time">${new Date(step.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})}</div>
                            <div class="step-loc"><i class="fa-solid fa-location-dot"></i> ${step.camera_id}</div>
                            <div style="margin-top: auto; font-size: 11px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase;">
                                SEC_EVENT_00${data.length - i}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch(e) {}
    }

    loadActiveTargets();
    window.ActiveIntervals.push(setInterval(loadActiveTargets, 15000));
</script>
{% endblock %}
