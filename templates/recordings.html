{% extends base_template %}

{% block content %}
<div class="evidence-wrapper" style="padding: 32px; height: 100%; overflow-y: auto;">
    <div class="header-section"
        style="margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center;">
        <div>
            <h2 style="font-size: 28px; font-weight: 800; letter-spacing: -0.5px;">Evidence Vault</h2>
            <p style="color: var(--text-secondary); font-size: 14px;">Review and analyze archived video surveillance
                records.</p>
        </div>
        <div class="action-bar" style="display: flex; gap: 12px;">
            <button class="btn" onclick="toggleFilter()"><i class="fa-solid fa-sliders"></i> FILTER</button>
            <button class="btn btn-primary" onclick="loadRecordings()"><i class="fa-solid fa-rotate"></i> SYNC
                VAULT</button>
        </div>
    </div>

    <!-- Collapsible Filter Panel -->
    <div id="filter-panel" class="card"
        style="display: none; padding: 24px; margin-bottom: 32px; background: var(--bg-sidebar);">
        <div
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; align-items: flex-end;">
            <div class="input-group">
                <label>Sensor Source</label>
                <select id="filter-camera" class="search-input">
                    <option value="">All Sensors</option>
                </select>
            </div>
            <div class="input-group">
                <label>Start Interval</label>
                <input type="datetime-local" id="filter-start" class="search-input">
            </div>
            <div class="input-group">
                <label>End Interval</label>
                <input type="datetime-local" id="filter-end" class="search-input">
            </div>
            <button class="btn btn-primary" onclick="loadRecordings()">APPLY FILTERS</button>
        </div>
    </div>

    <!-- Vault Table -->
    <div class="card" style="overflow: hidden;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background: rgba(255,255,255,0.02); text-align: left;">
                    <th
                        style="padding: 16px 24px; font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase;">
                        Temporal Stamp</th>
                    <th
                        style="padding: 16px 24px; font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase;">
                        Origin Sensor</th>
                    <th
                        style="padding: 16px 24px; font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase;">
                        Duration</th>
                    <th
                        style="padding: 16px 24px; font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; text-align: right;">
                        Actions</th>
                </tr>
            </thead>
            <tbody id="recordings-list">
                <tr>
                    <td colspan="4"
                        style="text-align: center; padding: 100px; color: var(--text-secondary); opacity: 0.5;">
                        Accessing encrypted vault files...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Premium Video Player Modal -->
<div id="video-modal" class="modal-overlay"
    style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(20px);">
    <div class="player-container"
        style="width: 90%; max-width: 1200px; background: var(--bg-panel); border-radius: 24px; overflow: hidden; box-shadow: 0 0 100px rgba(0,0,0,1); border: 1px solid var(--border-color);">
        <div
            style="padding: 20px 32px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <i class="fa-solid fa-play" style="color: var(--accent);"></i>
                <span style="font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;"
                    id="player-title">Evidence Playback</span>
            </div>
            <button onclick="closeVideo()"
                style="background: none; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer; transition: color 0.2s;"><i
                    class="fa-solid fa-xmark"></i></button>
        </div>
        <div style="background: #000; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center;">
            <video id="main-player" controls style="width: 100%; height: 100%;" preload="auto">
                <source src="" type="video/mp4">
            </video>
        </div>
        <div
            style="padding: 16px 32px; background: var(--bg-sidebar); display: flex; justify-content: space-between; align-items: center;">
            <div id="player-meta" style="font-size: 12px; color: var(--text-secondary); font-family: monospace;">
                SESSION_ID: UNKNOWN</div>
            <button class="btn" style="padding: 6px 12px; font-size: 11px;" onclick="downloadCurrent()"><i
                    class="fa-solid fa-download"></i> DOWNLOAD RAW</button>
        </div>
    </div>
</div>

<style>
    .input-group label {
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-bottom: 8px;
        display: block;
        letter-spacing: 0.5px;
    }

    .search-input {
        width: 100%;
        padding: 12px;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        color: #fff;
        font-size: 14px;
        outline: none;
    }

    td {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border-color);
        font-size: 14px;
    }

    .op-btn {
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        background: transparent;
        color: var(--text-primary);
        cursor: pointer;
        font-size: 12px;
        transition: var(--transition);
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .op-btn:hover {
        background: var(--bg-secondary);
        border-color: var(--text-secondary);
    }

    .op-btn-primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
    }

    .op-btn-primary:hover {
        background: var(--accent-hover);
    }

    @keyframes modalIn {
        from {
            opacity: 0;
            transform: scale(0.95);
        }

        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    .player-container {
        animation: modalIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
</style>

<script>
    document.getElementById('page-title').textContent = 'Secure Evidence Vault';

    let currentVideoPath = '';

    function toggleFilter() {
        const panel = document.getElementById('filter-panel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    async function loadRecordings() {
        const cam = document.getElementById('filter-camera').value;
        const start = document.getElementById('filter-start').value;
        const end = document.getElementById('filter-end').value;
        const list = document.getElementById('recordings-list');

        list.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 100px; color: var(--text-secondary);"><i class="fa-solid fa-spinner fa-spin"></i><br><br>Retrieving vault index...</td></tr>';

        try {
            const res = await fetch(`/api/recordings?camera_id=${cam}&start=${start}&end=${end}`);
            const data = await res.json();

            if (!data.length) {
                list.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 100px; color: var(--text-secondary); opacity: 0.5;">No archived evidence matches the current temporal query.</td></tr>';
                return;
            }

            list.innerHTML = data.map(rec => `
                <tr>
                    <td style="font-family: monospace; font-weight: 700;">${new Date(rec.start_time).toLocaleString()}</td>
                    <td><span style="background: var(--bg-secondary); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800;">${rec.camera_id}</span></td>
                    <td style="color: var(--text-secondary);">${rec.duration || 'N/A'}</td>
                    <td style="text-align: right;">
                        <div style="display: flex; gap: 8px; justify-content: flex-end;">
                            <button class="op-btn op-btn-primary" onclick="playVideo('${rec.file_path}', '${rec.id}')">
                                <i class="fa-solid fa-play"></i> PLAY
                            </button>
                            <button class="op-btn" onclick="deleteRecording('${rec.id}')">
                                <i class="fa-solid fa-trash-can" style="opacity: 0.5;"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        } catch (e) {
            list.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 100px; color: #c41e3a;">Vault synchronization failure. Please verify connection.</td></tr>';
        }
    }

    function playVideo(path, id) {
        currentVideoPath = path;
        const video = document.getElementById('main-player');
        video.src = `/api/recordings/video?path=${encodeURIComponent(path)}`;
        document.getElementById('player-meta').textContent = `EVIDENCE_ID: ${id} • PATH: ${path.split('\\').pop()}`;
        document.getElementById('video-modal').style.display = 'flex';
        video.load();
        video.play();
    }

    function closeVideo() {
        const video = document.getElementById('main-player');
        video.pause();
        video.src = '';
        document.getElementById('video-modal').style.display = 'none';
    }

    function downloadCurrent() {
        if (!currentVideoPath) return;
        const link = document.createElement('a');
        link.href = `/api/recordings/video?path=${encodeURIComponent(currentVideoPath)}`;
        link.download = currentVideoPath.split('\\').pop();
        link.click();
    }

    async function deleteRecording(id) {
        if (!confirm('Permanent archive deletion: Are you sure? This cannot be undone.')) return;
        try {
            await fetch(`/api/recordings/${id}`, { method: 'DELETE' });
            loadRecordings();
        } catch (e) { }
    }

    async function populateCameras() {
        const res = await fetch('/api/cameras');
        const cams = await res.json();
        const sel = document.getElementById('filter-camera');
        cams.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id; opt.textContent = c.id;
            sel.appendChild(opt);
        });
    }

    populateCameras();
    loadRecordings();
</script>
{% endblock %}
