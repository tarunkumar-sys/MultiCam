{% extends base_template %}

{% block content %}
<div class="content" style="padding: 32px; overflow-y: auto; height: 100%;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <div style="display: flex; flex-direction: column; gap: 4px;">
            <button onclick="Router.navigate('/people')" class="btn-link" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:13px; text-align:left; padding:0;">← Back to Registry</button>
            <h1 style="font-size: 24px; font-weight: 800;">Identity Audit History: <span id="person-header-name" style="color: var(--accent);">All Profiles</span></h1>
        </div>
        <button class="btn btn-primary" onclick="loadAuditLogs()">Refresh Audit</button>
    </div>

    <table class="logs-table" style="width: 100%; border-collapse: collapse; background: var(--bg-panel); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border-color);">
        <thead>
            <tr style="background: var(--accent); color: white;">
                <th style="padding: 16px 20px; text-align: left;">Timestamp</th>
                <th style="padding: 16px 20px; text-align: left;">Subject</th>
                <th style="padding: 16px 20px; text-align: left;">Sensor / Point of Capture</th>
                <th style="padding: 16px 20px; text-align: center;">Evidence</th>
            </tr>
        </thead>
        <tbody id="audit-logs-ajax">
            <tr><td colspan="4" style="text-align:center; padding:40px;">Scanning identity database...</td></tr>
        </tbody>
    </table>
</div>

<script>
    document.getElementById('page-title').textContent = 'Forensic Identity Audit Logs';

    const auditParams = new URLSearchParams(window.location.search);
    const filterName = auditParams.get('person_name');
    if(filterName) document.getElementById('person-header-name').textContent = filterName;

    async function loadAuditLogs() {
        const body = document.getElementById('audit-logs-ajax');
        try {
            const url = filterName ? `/api/identity/audit?name=${encodeURIComponent(filterName)}` : '/api/identity/audit';
            const res = await fetch(url);
            const logs = await res.json();
            
            if(!logs.length) {
                body.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px;">No matching identity encounters found.</td></tr>';
                return;
            }
            
            body.innerHTML = logs.map(l => {
                const img = l.image_path ? `/api/snapshot_image?path=${encodeURIComponent(l.image_path)}` : '/static/placeholder.jpg';
                return `
                    <tr style="border-bottom:1px solid var(--border-color);">
                        <td style="padding:16px 20px; font-family:monospace; font-weight:600;">${l.timestamp}</td>
                        <td style="padding:16px 20px;">
                            <div style="display:flex; align-items:center; gap:12px;">
                                <img src="${img}" style="width:40px; height:40px; border-radius:50%; object-fit:cover; border:2px solid var(--accent);">
                                <span style="font-weight:700;">${l.person_name}</span>
                            </div>
                        </td>
                        <td style="padding:16px 20px;">
                            <span style="background:var(--bg-secondary); padding:4px 10px; border-radius:4px; font-size:12px; font-weight:700;">${l.camera_id}</span>
                            <div style="font-size:11px; color:var(--text-secondary); margin-top:4px;">IP: ${l.camera_ip}</div>
                        </td>
                        <td style="padding:16px 20px; text-align:center;">
                            <button class="btn-sm" onclick="window.open('${img}')">View Frame</button>
                        </td>
                    </tr>
                `;
            }).join('');
        } catch(e) {}
    }

    loadAuditLogs();
</script>

<style>
    .btn-link:hover { color: var(--accent) !important; }
    .btn-sm { padding: 6px 12px; font-size: 11px; font-weight: 700; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary); cursor: pointer; }
</style>
{% endblock %}
